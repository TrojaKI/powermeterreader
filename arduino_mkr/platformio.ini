[platformio]
src_dir = stromzaehler

[env:mkrwifi1010]
platform  = atmelsam
board     = mkrwifi1010
framework = arduino

; makes ~/Arduino/libraries/ available so config.h can #include <Configuration.h>
lib_extra_dirs = ~/Arduino/libraries
lib_ignore     = ArduinoSTL

lib_deps =
    arduino-libraries/WiFiNINA@2.0.1
    knolleary/PubSubClient
    rweather/Crypto

; WiFiNINA 2.0.1 — board has NINA firmware 3.0.1.
; SFU incompatible: SFU blob (framework-arduino-samd 1.8.14) never touches PORTB,
; so it can't control NINA_RESETN. Arduino_SpiNINA::end() drives PB08 HIGH (NINA reset);
; after NVIC_SystemReset PB08 floats HIGH via board pull-up → NINA stays in reset →
; SFU hangs waiting for NINA_ACK. SFU removed; browser OTA via web.cpp still works.
build_flags =

monitor_port = /dev/ttyACM0
monitor_speed = 2400
