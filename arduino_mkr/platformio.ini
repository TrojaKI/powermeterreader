[platformio]
src_dir = stromzaehler

[env:mkrwifi1010]
platform  = atmelsam
board     = mkrwifi1010
framework = arduino

; makes ~/Arduino/libraries/ available so config.h can #include <Configuration.h>
lib_extra_dirs = ~/Arduino/libraries
lib_ignore     = ArduinoSTL

lib_deps =
    arduino-libraries/WiFiNINA
    knolleary/PubSubClient
    rweather/Crypto

; Force SFU second-stage bootloader into firmware so NINA OTA works after reboot
; Without --undefined, the linker drops libSFU.a because SFU_BOOT has no callers
build_flags = -Wl,--undefined=SFU_BOOT

monitor_port = /dev/ttyACM0
monitor_speed = 2400
